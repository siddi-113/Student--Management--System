        <br></br>

         <br></br>
         <div id="forgot">

         <div class="btn-container">
    <button type="submit" id="login_b">Login</button> 
    </form>
      <button  id="back_b" onclick="back()">Back</button> 
       <button id="forgot_b" onclick="Forgot()">Forgot Password</button>
    </div>

    </p>
    </div>
